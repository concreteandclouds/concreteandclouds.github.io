### Your Updated `hugo.toml`

Copy everything in the code block below, go to your repository, click the pencil icon on `hugo.toml`, select all the old text, paste this new text over it, and commit the changes!

```toml
baseURL = "https://concreteandclouds.github.io/"
languageCode = "en-gb"
title = "Concrete and Clouds"
theme = "castanet"
googleAnalytics = ""
themesdir = "themes"
pagination.pagerSize = "9"
buildFuture = true

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[permalinks]
	# page = "/:filename/"
	about = "/:filename/"
	episode = "/:filename/"


# The theme supports menus with up to one submenu per menu item
# The menu name must be "Main"
# The menus are sorted based upon their identifier
[[Menu.Main]]
    name = "About"
    identifier = "about"
    url = "/about"

[[Menu.Main]]
    name = "Contact"
    identifier = "contact"
    url = "/contact"

[[Menu.Main]]
    name = "Hosts"
    identifier = "hosts"
    url = "/host"

[[Menu.Main]]
    name = "Guests"
    identifier = "guests"
    url = "/guest"

[[Menu.Main]]
    name = "Upcoming Episodes"
    identifier = "upcoming"
    url = "/upcoming"

[[Menu.Main]]
    name = "Blog"
    identifier = "blog"
    url = "/blog"

[[Menu.Main]]
    name = "Resources"
    identifier = "resources"
    url = "#!"

[[Menu.Main]]
    name = "Books"
    identifier = "books"
    url = "/books"
    parent = "resources"
[[Menu.Main]]
    name = "Podcasts"
    identifier = "podcasts"
    url = "/books"
    parent = "resources"
[[Menu.Main]]
    name = "Internet"
    identifier = "internet"
    url = "https://www.google.com"

[params]
googleAnalytics_UA = ""
mainSections = ["episode"]
episode_number_style  = "brackets"
episode_number_prefix = "CWC"
site_theme = "blue"
