baseURL = "https://concreteandclouds.github.io/"
locale = "en-gb"
title = "Concrete and Clouds"
theme = "castanet"
googleAnalytics = ""
themesdir = "themes"
pagination.pagerSize = "9"
buildFuture = true

[author]
  name = "Mark Beachill"
  email = "markbeachill@gmail.com" # Put your actual email here!

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[permalinks]
# page = "/:contentbasename/"
about = "/:contentbasename/"
  episode = "/:contentbasename/"


# The theme supports menus with up to one submenu per menu item
# The menu name must be "Main"
# The menus are sorted based upon their identifier
[[Menu.Main]]
    name = "About"
    identifier = "about"
    url = "/about"

# [[Menu.Main]]
#     name = "Podcasts"
#     identifier = "podcasts"
#     url = "/books"
#     parent = "resources"

[params]
googleAnalytics_UA = ""
mainSections = ["episode"]
episode_number_style  = "brackets"
episode_number_prefix = ""
site_theme = "grey"
# site_layout = "grid"
site_layout = "list"
show_next_upcoming = "true"
enable_jumbo = "false"
# enable_jumbo = "false"
disable_title_caps = "true"
# truncate = "100"
# about_logo = "/img/hugocast.png"
copyright_notice = "Copyright 2026 Mark Beachill"
# youtube_subscribe = ""
itunes_subscribe = "https://podcasts.apple.com/gb/podcast/concrete-and-clouds/id1827839997"
# android_subscribe = ""
spotify_subscribe = "https://open.spotify.com/show/0" # Ensure you replace the '0' with your actual Spotify show ID later
# stitcher_subscribe = ""
# soundcloud_subscribe = ""
# pocketcasts_subscribe = ""
# mailchimp_subscribe = ""
# rss_subscribe = "http://feed.com/myfeed" #only set this if you don't want to use the built-in feed
description = "Discussing politics and society by bringing the real and the abstract together."
# media_prefix = "" 
disqusShortname = ""
custom_css = ["css/custom.css"]
strapline = "Discussing politics and society by bringing the real and the abstract together"
  truncate = "300"   # characters of episode summary shown on the homepage



# ... other settings
  relativeURLs = false


  # If you want to use fathom(https://usefathom.com) for analytics, add this section
  [params.fathomAnalytics]
    siteID = "ABCDE"

  [params.feed]
    copyright = "Copyright 2026 Mark Beachill" #do not use markdown in this field; it is used in the feed
    itunes_subtitle = "Discussing politics and society" #no markdown or HTML
    itunes_author = "Mark Beachill" #no markdown or HTML
    itunes_summary = "Discussing politics and society by bringing the real and the abstract together." # Limited to 4000 characters or less, plain text, no HTML
    itunes_owner_name = "Mark Beachill"
    itunes_owner_email = "your.email@example.com" # UPDATE THIS TO YOUR EMAIL
    itunes_image = "https://concreteandclouds.github.io/img/cwc-logo.jpg" # Update this when you host your artwork image
    itunes_top_category = "Society & Culture"
    itunes_first_sub_category = "Politics"
    language = "en-gb"

  [params.realfavicongenerator] # https://realfavicongenerator.net/
    mask_icon_color="#5bbad5"
    msapplication_tilecolor="#2b5797"
    theme_color="#ffffff"

  [params.podlove] # https://subscribe-button.podlove.org
    subscribe_title = ""              # fallback: site title from above
    subscribe_subtitle = ""           # fallback: ""
    subscribe_description = ""        # fallback: ""
    subscribe_cover = "img/logo.jpg"  # fallback: ""
    subscribe_color = "#585e6c"       # fallback: ""
    subscribe_size = "medium"         # options: small, medium, big
    subscribe_format = "rectangle"    # options: rectangle, square, cover
    subscribe_style = "filled"        # options: filled, outline, frameless
    subscribe_language = "en"         # options: nl (dutch), en (english), eo (esperanto), de (german), fi (finnish), fr (french), ja (french)
    subscribe_feed_type = "audio"     # options: audio, video
    subscribe_feed_format = "mp3"     # options: mp3, aac, ogg, opus

  # Social links can be given in full URL form or short form
  # In the short form the theme will generate a relevant URL
  [params.social]
    # github = ""
    # gitlab = ""
    # facebook = ""
    # facebook_admin = ["500557137","1234"] # This needs to be one or more page admins to get domain insights
    # twitter = ""
    # twitter_domain = "" # This domain shows in twitter cards as "View on `twitter_domain`"
    # pinterest = ""
    # instagram = ""
    # youtube = ""
    # Short form in linkedin will link to a user's page so use long form for company pages
    # linkedin = ""
    # twitch = ""
    # mastodon = ""
    # threads = ""

  [params.authors]
   # [params.authors.Mark]
     # name	= "Mark Beachill"
      # thumbnail = "img/host/mark.png" # Upload a photo of yourself to static/img/host/ and name it mark.png
      # bio = "Host of Concrete and Clouds."
     # [params.authors.Mark.social]
        # twitter = ""
        # linkedin = ""

    [params.links]
      [params.links.cwc]
        name = "Concrete and Clouds"
        url = "https://concreteandclouds.github.io/"

